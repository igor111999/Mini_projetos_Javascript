<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jogo do Número Secreto</title>
</head>
<body>

    <h2>Jogo do Número Secreto</h2>

    <p>Tente adivinhar o número de 1 a 100</p>

    <input type="number" id="palpite">
    <button onclick="verificar()">Verificar</button>

    <p id="resultado"></p>

    <script>
        function verificar() {

            var numero_secreto = 56;
            var palpite = parseInt(document.getElementById("palpite").value);

            if (palpite == numero_secreto) {
                document.getElementById("resultado").innerText = "Acertou!";
            } 
            else if (palpite < numero_secreto) {
                document.getElementById("resultado").innerText =
                    "O número é maior do que o digitado.";
            } 
            else {
                document.getElementById("resultado").innerText =
                    "O número é menor do que o digitado.";
            }

        }
    </script>

</body>
</html>

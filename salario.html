<!DOCTYPE html>
<html>
<body>
  <input type="text" id="nome" placeholder="Digite o nome do funcionário">
  <br>
  <input type="text" id="salario" placeholder="Digite o salário do funcionário">
  <br>
  <div id="resultado"></div>
  <button type="button" onclick="verificar()">Verificar</button>

<script>
function verificar() {
    var nome = document.getElementById("nome").value;
    var salario = document.getElementById("salario").value;
    var mensagem = "O funcionário " + nome + " recebe R$ " + salario;
    
    document.getElementById("resultado").innerHTML = mensagem;
}
</script>

</body>
</html>
